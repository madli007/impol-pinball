<!doctype html>
<html lang="sl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Impol Pinball</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="intro-panel" aria-labelledby="game-title">
        <p class="eyebrow">Impol Aluminium Industry</p>
        <h1 id="game-title">Impol Pinball</h1>
        <p class="subtitle">Digital transformation multiball starts with a stable playable MVP.</p>
      </section>

      <section class="game-stage" aria-label="Pinball playfield preview">
        <canvas id="game-canvas" width="900" height="1400"></canvas>
        <div class="stage-placeholder">
          <span>Phase 1.1</span>
          <strong>Page shell ready</strong>
        </div>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="game.js"></script>
  </body>
</html>
